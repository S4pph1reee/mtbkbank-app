version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: mtbbank
      POSTGRES_USER: mtbbank
      POSTGRES_PASSWORD: mtbbank_secret_2024
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mtbbank"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  api:
    build: .
    restart: always
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://mtbbank:mtbbank_secret_2024@postgres:5432/mtbbank
      REDIS_URL: redis://redis:6379
      JWT_SECRET: mtbbank_jwt_secret_change_in_production
      PORT: 3000
      NODE_ENV: development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./src:/app/src
      - ./prisma:/app/prisma
      - /app/node_modules

volumes:
  pgdata:
  redisdata:
